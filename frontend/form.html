<!DOCTYPE html>
<html>
<head>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <title>Ration System</title>

    <style>
       body {
    font-family: Arial;
    background: linear-gradient(135deg, #667eea, #764ba2);
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding-top: 40px;
    margin: 0;
}

.box {
    background: #fff;
    padding: 25px;
    border-radius: 15px;
    width: 380px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

h2 {
    text-align: center;
    margin-bottom: 15px;
}

input {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
    border-radius: 8px;
    border: 1px solid #ccc;
    outline: none;
    transition: 0.3s;
}

input:focus {
    border-color: #667eea;
    box-shadow: 0 0 5px #667eea;
}

button {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    background: #667eea;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #5a67d8;
}

label {
    margin-right: 10px;
    font-size: 14px;
}

/* Report Card */
#report {
    margin-top: 20px;
    background: #fff;
    padding: 20px;
    width: 380px;
    border-radius: 15px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

/* Table Styling */
table {
    width: 100%;
    border-collapse: collapse;
    font-size: 14px;
}

th {
    background: #667eea;
    color: white;
    padding: 8px;
}

td {
    padding: 8px;
    text-align: center;
}

tr:nth-child(even) {
    background: #f2f2f2;
}
    </style>
</head>

<body>

<div>
    <div class="box">
        <h2>Ration Entry</h2>

        <input type="date" id="date">
        <input type="text" id="name" placeholder="Customer Name">
        <input type="text" id="ration" placeholder="Ration Card Number">
        <input type="number" id="members" placeholder="Total Members">

        <!--  Radio Buttons -->
        <label><input type="radio" name="type" value="PHH" checked> PHH</label>
        <label><input type="radio" name="type" value="APL"> APL</label>

        <button onclick="saveData()">Save Entry</button>
        <button onclick="showDatePicker()">Generate Report </button>
        <input type="date" id="reportDate" onchange="showReport()">
        <button onclick="printReport()">Print / Save PDF</button>
    </div>

    <!-- Report Display -->
    <div id="report"></div>
</div>

<script>
console.log(localStorage.getItem("rationData"));
 function downloadPDF() {
    let element = document.getElementById("report");

    let opt = {
        margin: 0.5,
        filename: 'Ration_Report.pdf',
        image: { type: 'jpeg', quality: 1 },
        html2canvas: { scale: 2 },
        jsPDF: { unit: 'in', format: 'a4', orientation: 'portrait' }
    };

    html2pdf().set(opt).from(element).save();
}

// Save Data
function saveData() {

    let type = document.querySelector('input[name="type"]:checked').value;

    let data = {
        date: document.getElementById("date").value,
        name: document.getElementById("name").value,
        ration: document.getElementById("ration").value,
        members: Number(document.getElementById("members").value),
        type: type
    };

    let allData = JSON.parse(localStorage.getItem("rationData")) || [];
    allData.push(data);

    localStorage.setItem("rationData", JSON.stringify(allData));

    alert("Saved ✅");
}

// Date picker open kar
function showDatePicker() {
    document.getElementById("reportDate").click();
}

//  Show Report 
function showReport()  {

    let selectedDate = document.getElementById("reportDate").value;
    let allData = JSON.parse(localStorage.getItem("rationData")) || [];

    let output = "<h3>Daily Report</h3>";
    output += "<b>Date: " + selectedDate + "</b><br><br>";

    
    output += "<table border='1' width='100%' style='border-collapse:collapse'>";
    output += "<tr><th>RC No</th><th>Name</th><th>Type</th><th>Members</th><th>Wheat</th><th>Rice</th></tr>";

    for(let i = 0; i < allData.length; i++) {

        if(allData[i].date === selectedDate) {

            let wheat, rice;

            if(allData[i].type === "APL") {
                wheat = 15;
                rice = 15;
            } else {
                wheat = allData[i].members * 3;
                rice = allData[i].members * 2;
            }

            output += "<tr>";
            output += "<td>" + allData[i].ration + "</td>";
            output += "<td>" + allData[i].name + "</td>";
            output += "<td>" + allData[i].type + "</td>";
            output += "<td>" + allData[i].members + "</td>";
            output += "<td>" + wheat + " kg</td>";
            output += "<td>" + rice + " kg</td>";
            output += "</tr>";
        }
    }

    output += "</table>";

    document.getElementById("report").innerHTML = output;
}

</script>

</body>
</html>
