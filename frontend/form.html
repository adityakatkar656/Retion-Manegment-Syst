<body>
    

<div>
    <div class="box">
        <h2>Ration Entry</h2>

        <input type="date" id="date">
        <input type="text" id="name" placeholder="Customer Name">
        <input type="text" id="rationNo" placeholder="Enter Ration Card Number" onkeyup="autofillData()">
        <input type="text" id="slipno" placeholder="slip number">
        <input type="number" id="members" placeholder="Total Members">

        <!--  Radio Buttons -->
        <label><input type="radio" name="type" value="PHH" checked> PHH</label>
        <label><input type="radio" name="type" value="APL"> APL</label>

        <button onclick="saveData()">Save Entry</button>
        
        <input type="date" id="reportDate" onchange="showReport()">
        <button onclick="downloadPDF()">Download PDF</button>
    </div>

    <!-- Report Display -->
    <div id="report"></div>
</div>
</div>
<script>
  

function downloadPDF() {

    let element = document.getElementById("report");

    if (!element || element.innerHTML.trim() === "") {
        alert("First generate report ❗");
        return;
    }

    let originalContent = document.body.innerHTML;

    // 🔥 only report show kar
    document.body.innerHTML = element.innerHTML;

    window.print(); // 👉 print window open hoil

    // 🔥 parat page restore
    document.body.innerHTML = originalContent;

    location.reload(); // refresh
}
    



// Save Data
function saveData() {

    let type = document.querySelector('input[name="type"]:checked').value;

    let data = {
        date: document.getElementById("date").value,
        name: document.getElementById("name").value,
        ration: document.getElementById("rationNo").value,
        slipno: document.getElementById("slipno").value,
        members: Number(document.getElementById("members").value),
        type: type
    };

    let allData = JSON.parse(localStorage.getItem("rationData")) || [];
    allData.push(data);

    localStorage.setItem("rationData", JSON.stringify(allData));

    alert("Saved ✅");
}

// Date picker open kar
function showDatePicker() {
    document.getElementById("reportDate").click();
}


function autofillData() {

    let rationNo = document.getElementById("rationNo").value.trim();

    if (rationNo === "") return;

    let allData = JSON.parse(localStorage.getItem("rationData")) || [];

    for (let i = 0; i < allData.length; i++) {

        if (allData[i].ration == rationNo) {

            document.getElementById("name").value = allData[i].name;
            document.getElementById("members").value = allData[i].members;
            document.getElementById("slipno").value = allData[i].slipno;

            // type select
            let radios = document.getElementsByName("type");
            for (let j = 0; j < radios.length; j++) {
                if (radios[j].value === allData[i].type) {
                    radios[j].checked = true;
                }
            }

            return; // found zala ki stop
        }
    }
}

//  Show Report 
function showReport() {

    let selectedDate = document.getElementById("reportDate").value;

    if(!selectedDate){
        alert("First select date ❗");
        return;
    }

    let allData = JSON.parse(localStorage.getItem("rationData")) || [];

 let output = `
<div style="text-align:center;">
    <h2>Daily Report</h2>
    <p><b>Date: ${selectedDate}</b></p>
</div>

<table style="width:100%; border-collapse:collapse; text-align:center;">
<tr>
<th>RC No</th>
<th>Name</th>
<th>Type</th>
<th>Members</th>
<th>Slip No</th>
<th>Wheat</th>
<th>Rice</th>
</tr>
`;
    

   // output += "<table border='1' width='100%' style='border-collapse:collapse'>";
   // output += "<tr><th>RC No</th><th>Name</th><th>Type</th><th>Members</th><th>Slip No</th><th>Wheat</th><th>Rice</th></tr>";
    

    let found = false;

    for(let i = 0; i < allData.length; i++) {

        if(allData[i].date === selectedDate) {

            found = true;

            let wheat, rice;

            if(allData[i].type === "APL") {
                wheat = 15;
                rice = 15;
            } else {
                wheat = allData[i].members * 3;
                rice = allData[i].members * 2;
            }

            output += "<tr>";
            output += "<td>" + allData[i].ration + "</td>";
            output += "<td>" + allData[i].name + "</td>";
            output += "<td>" + allData[i].type + "</td>";      
            output += "<td>" + allData[i].members + "</td>";   
            output += "<td>" + allData[i].slipno + "</td>";  
            output += "<td>" + wheat + " kg</td>";
            output += "<td>" + rice + " kg</td>";
            output += "</tr>";
        }
    }

    if(!found){
        output += "<tr><td colspan='7'>No Data Found ❗</td></tr>";
    }

    output += "</table>";

    document.getElementById("report").innerHTML = output;
}

</script>
