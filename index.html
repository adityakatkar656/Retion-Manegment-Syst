<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <style>
        body {
            font-family: Arial;
            background: #5b86e5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .box {
            background: white;
            padding: 30px;
            border-radius: 10px;
            width: 300px;
            text-align: center;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
        }

        button {
            padding: 10px;
            width: 100%;
            background: #5b86e5;
            color: white;
            border: none;
        }
    </style>
</head>

<body>

    <div class="box">
        <h2>Login</h2>

        <input type="text" placeholder="Phone Number">
        <input type="password" placeholder="Password">

        <button onclick="login()">Login</button>
    </div>

    <script>
        function login() {
            // 👉 direct redirect (no check)
            window.location.href = "form.html";
        }
    </script>

</body>
</html>
