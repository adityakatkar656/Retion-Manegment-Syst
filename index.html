<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <style>
        body {
            font-family: Arial;
            background: #5b86e5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .box {
            background: white;
            padding: 30px;
            border-radius: 10px;
            width: 300px;
            text-align: center;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
        }

        button {
            padding: 10px;
            width: 100%;
            background: #5b86e5;
            color: white;
            border: none;
        }
    </style>
</head>

<body>

    <div class="box">
        <h2>Login</h2>

        <input type="text" placeholder="Phone Number" id="phno">
        <input type="password" placeholder="Password" id="password" onfocus="showhint" onblur="hidehint()">
        <p id="hint" style="color:gray; display:none;">
    Password length must be 8 characters
</p>

        <button onclick="login()">Login</button>
    </div>

    <script>
        function showhint() {
            document.getElementById("hint").style.display = "block";
        }
        function hidehint() {
            document.getElementById("hint").style.display = "none";
        }

        function login() {
            const phno = document.getElementById("phno").value;
            const password = document.getElementById("password").value;
            if (/^[0-9]{10}$/.test(phno) && password.length===8) {
                   localStorage.setItem("phno", phno);
                   localStorage.setItem("password", password);
                 window.location.href = "frontend/form.html";
        }
        else {
            alert("Invalid phone number or password. Please try again.");
        }
    }
    </script>

</body>
</html>
